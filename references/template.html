<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南京审计大学学术讲座查询系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ========== THEME: 墨砚 (Ink Stone) — Warm cream + cinnabar ========== */
:root, body.theme-ink {
  --primary: #c94f4f; --success: #4a8c5c; --danger: #c94f4f;
  --gray: #9c9484; --bg: #faf7f2; --card: #ffffff;
  --text: #2c2416; --border: #e5ddd0; --hover: #f5f0e6;
  --bg-green: #e6f0e6; --bg-red: #fce8e6; --bg-gray: #f4f1ed;
  --ff-display: 'Noto Serif SC',Georgia,serif;
  --ff-body: 'Noto Serif SC','PingFang SC','Microsoft YaHei',serif;
  --ff-mono: 'JetBrains Mono','SF Mono',Consolas,monospace;
  --grain: none;
  --shadow: 0 1px 3px rgba(44,36,22,0.04);
}
/* ========== THEME: 深海 (Deep Sea) — Navy + teal ========== */
body.theme-ocean {
  --primary: #5b9bd5; --success: #6bae85; --danger: #d4736a;
  --gray: #7a8ea0; --bg: #0c1520; --card: #141e2c;
  --text: #d4dee8; --border: #1e3040; --hover: #192636;
  --bg-green: #102218; --bg-red: #241616; --bg-gray: #161e24;
  --ff-display: 'Noto Serif SC',Georgia,serif;
  --ff-body: 'Noto Serif SC','PingFang SC','Microsoft YaHei',serif;
  --ff-mono: 'JetBrains Mono','SF Mono',Consolas,monospace;
  --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
}
/* ========== THEME: 赤霞 (Crimson Cloud) — Deep burgundy + rose gold ========== */
body.theme-crimson {
  --primary: #d4867c; --success: #6a9e6a; --danger: #d4736a;
  --gray: #a09094; --bg: #1a1016; --card: #221820;
  --text: #e8dce0; --border: #34202a; --hover: #2a1c24;
  --bg-green: #182016; --bg-red: #26181a; --bg-gray: #1e1820;
  --ff-display: 'Noto Serif SC',Georgia,serif;
  --ff-body: 'Noto Serif SC','PingFang SC','Microsoft YaHei',serif;
  --ff-mono: 'JetBrains Mono','SF Mono',Consolas,monospace;
  --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
}
/* ========== THEME: 竹韵 (Bamboo) — Sage green + fresh ========== */
body.theme-bamboo {
  --primary: #4a8c5e; --success: #5a9a6a; --danger: #c97060;
  --gray: #8a9a88; --bg: #f4f8f3; --card: #ffffff;
  --text: #1e2c1e; --border: #d4e5d4; --hover: #e8f2e8;
  --bg-green: #ddf0de; --bg-red: #fce8e6; --bg-gray: #f0f3ef;
  --ff-display: 'Noto Serif SC',Georgia,serif;
  --ff-body: 'Noto Serif SC','PingFang SC','Microsoft YaHei',serif;
  --ff-mono: 'JetBrains Mono','SF Mono',Consolas,monospace;
  --grain: none;
  --shadow: 0 1px 3px rgba(30,44,30,0.04);
}
/* ========== THEME: 暮紫 (Twilight Violet) — Deep purple + lavender ========== */
body.theme-dusk {
  --primary: #b893ce; --success: #7aae8a; --danger: #d47a7a;
  --gray: #8a85a0; --bg: #141028; --card: #1c1834;
  --text: #e0dce8; --border: #282240; --hover: #221e38;
  --bg-green: #142016; --bg-red: #26181e; --bg-gray: #1a1824;
  --ff-display: 'Noto Serif SC',Georgia,serif;
  --ff-body: 'Noto Serif SC','PingFang SC','Microsoft YaHei',serif;
  --ff-mono: 'JetBrains Mono','SF Mono',Consolas,monospace;
  --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
}
/* ========== THEME: 霜白 (Frost) — Bright white + icy blue ========== */
body.theme-frost {
  --primary: #5b8eb5; --success: #5a9a7a; --danger: #c97060;
  --gray: #a0a8b0; --bg: #f8fafc; --card: #ffffff;
  --text: #1e2a34; --border: #e0e6ec; --hover: #f0f4f8;
  --bg-green: #e4f2ea; --bg-red: #fce8e6; --bg-gray: #f2f4f6;
  --ff-display: 'Noto Serif SC',Georgia,serif;
  --ff-body: 'Noto Serif SC','PingFang SC','Microsoft YaHei',serif;
  --ff-mono: 'JetBrains Mono','SF Mono',Consolas,monospace;
  --grain: none;
  --shadow: 0 1px 3px rgba(30,42,52,0.04);
}


/* ========== BASE ========== */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  transition: background 0.4s ease, color 0.4s ease;
}
/* Grain overlay — only when grain exists */
body::after {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  opacity: 0.035; background-image: var(--grain);
}
body:not([class*="theme-"])::after,
body.theme-ink::after,
body.theme-bamboo::after,
body.theme-frost::after { display: none; }

/* ========== HEADER ========== */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 28px 48px;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 16px;
  box-shadow: var(--shadow);
}
.header h1 { font-size: 26px; font-weight: 700; color: var(--primary); font-family: var(--ff-display); }
.header p { font-size: 13px; color: var(--gray); margin-top: 4px; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.theme-btn {
  font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.04em;
  background: var(--card); color: var(--text);
  border: 1px solid var(--border); padding: 7px 16px; border-radius: 6px;
  cursor: pointer; transition: all 0.25s ease;
}
.theme-btn:hover { border-color: var(--primary); color: var(--primary); }
.theme-cycle {
  display: inline-flex; align-items: center; gap: 6px;
}
.theme-swatch {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--primary); border: 2px solid var(--border);
  transition: background 0.3s;
}

/* ========== STATS ========== */
.stats-row { display: flex; gap: 1px; padding: 0 48px; background: var(--border); flex-wrap: wrap; }
.stat-card {
  flex: 1; min-width: 150px; background: var(--card);
  padding: 24px 28px; text-align: center; cursor: default;
  transition: background 0.3s;
}
.stat-card:hover { filter: brightness(0.98); }
.stat-card .icon { font-size: 24px; margin-bottom: 6px; }
.stat-card .value { font-size: 36px; font-weight: 700; margin-bottom: 2px; font-family: var(--ff-display); }
.stat-card .label { font-size: 12px; color: var(--gray); letter-spacing: 0.04em; }
.st0 .value { color: var(--primary); }
.st1 .value { color: var(--success); }
.st2 .value { color: var(--danger); }
.st3 .value { color: var(--gray); }

/* ========== FILTERS ========== */
.filter-bar {
  display: flex; gap: 8px; padding: 20px 48px 16px;
  align-items: center; flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 18px; font-size: 13px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--card); color: var(--text);
  cursor: pointer; transition: all 0.2s;
  font-family: var(--ff-body);
}
.filter-btn:hover { border-color: var(--primary); color: var(--primary); }
.filter-btn.active {
  background: var(--primary); color: #fff; border-color: var(--primary);
}
.search-input {
  flex: 1; min-width: 200px; max-width: 320px; margin-left: auto;
  padding: 8px 14px; font-size: 13px; border: 1px solid var(--border);
  border-radius: 6px; outline: none; background: var(--card); color: var(--text);
  transition: border-color 0.2s; font-family: var(--ff-body);
}
.search-input::placeholder { color: var(--gray); }
.search-input:focus { border-color: var(--primary); }
.result-count { font-size: 12px; color: var(--gray); margin-left: 8px; white-space: nowrap; }

/* ========== TABLE ========== */
.table-wrap {
  margin: 0 48px 24px; background: var(--card);
  border: 1px solid var(--border); border-radius: 6px;
  overflow: hidden; box-shadow: var(--shadow);
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: var(--primary); color: #fff; font-weight: 600;
  font-size: 12px; padding: 12px 14px; text-align: left;
  white-space: nowrap; letter-spacing: 0.03em;
}
thead th:first-child { text-align: center; }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { opacity: 0.85; }
tbody td {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  vertical-align: middle; transition: background 0.15s;
  text-align: left;
}
tbody td:first-child,
tbody td:nth-child(2) { text-align: center; }
tbody td:nth-child(4),
tbody td:nth-child(5),
tbody td:nth-child(6),
tbody td:nth-child(7) { text-align: center; }
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: var(--hover); }
.s-未开始 { background: var(--bg-green); color: var(--success); }
.s-已过时 { background: var(--bg-red); color: var(--danger); }
.s-未知 { background: var(--bg-gray); color: var(--gray); }
.status-dot {
  display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  margin-right: 6px; vertical-align: middle;
  background: currentColor;
}
a.cell-link {
  color: var(--primary); text-decoration: none; font-size: 12px;
  border-bottom: 1px dotted var(--primary);
  transition: all 0.15s;
}
a.cell-link:hover { border-bottom-style: solid; }

/* ========== LOG ========== */
.log-section { margin: 0 48px 24px; }
.log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.log-header h3 {
  font-size: 13px; font-weight: 600; color: var(--gray);
  cursor: pointer; user-select: none; letter-spacing: 0.04em;
}
.log-header h3:hover { color: var(--primary); }
.log-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px 16px;
  font-family: var(--ff-mono); font-size: 11px; line-height: 1.7;
  max-height: 160px; overflow-y: auto; color: var(--gray);
  transition: all 0.3s ease;
}
.log-box.collapsed { display: none; }
.log-clear {
  font-size: 11px; color: var(--gray); background: var(--card);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 12px; cursor: pointer; font-family: var(--ff-body);
}
.log-clear:hover { border-color: var(--primary); color: var(--primary); }

/* ========== TIME HINT & SORT ========== */
.time-rel { font-size: 10px; color: var(--gray); display: block; margin-top: 2px; }
.sort-arrow { font-size: 10px; margin-left: 2px; opacity: 0.7; }

/* ========== FOOTER ========== */
.footer {
  margin: 0 48px 32px; padding: 16px 20px; background: var(--card);
  border: 1px solid var(--border); border-radius: 6px;
  text-align: center; font-size: 12px; color: var(--gray);
}
.dot-g { color: var(--success); font-weight: 700; }
.dot-r { color: var(--danger); font-weight: 700; }
.dot-a { color: var(--gray); font-weight: 700; }

@media (max-width: 768px) {
  .header, .filter-bar, .table-wrap, .log-section, .footer { margin-left: 16px; margin-right: 16px; }
  .header { padding: 20px; }
  .stats-row { padding: 0 16px; }
  .filter-bar { padding: 16px 16px 12px; }
}
</style>
</head>
<body class="theme-ink">

<div class="header">
  <div>
    <h1>南京审计大学学术讲座查询系统</h1>
    <p>全状态展示 · 智能排序 · 关键词搜索 | 数据源: nau.edu.cn</p>
  </div>
  <div class="header-actions">
    <span style="font-size:12px;color:var(--gray)" id="ct"></span>
    <button class="theme-btn" onclick="cth()" id="themeBtn">
      <span class="theme-cycle"><span class="theme-swatch"></span><span id="themeLabel">墨砚</span></span>
    </button>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card st0"><div class="icon">📅</div><div class="value" id="s0">—</div><div class="label">总讲座数</div></div>
  <div class="stat-card st1"><div class="icon">⏰</div><div class="value" id="s1">—</div><div class="label">未开始</div></div>
  <div class="stat-card st2"><div class="icon">📜</div><div class="value" id="s2">—</div><div class="label">已过时</div></div>
  <div class="stat-card st3"><div class="icon">❓</div><div class="value" id="s3">—</div><div class="label">状态未知</div></div>
</div>

<div class="filter-bar">
  <label style="font-weight:600;font-size:13px;color:var(--gray)">筛选</label>
  <button class="filter-btn" onclick="sf('all',this)">全部</button>
  <button class="filter-btn active" onclick="sf('未开始',this)">未开始</button>
  <button class="filter-btn" onclick="sf('已过时',this)">已过时</button>
  <button class="filter-btn" onclick="sf('未知',this)">未知</button>
  <input class="search-input" placeholder="搜索标题 / 报告人 / 主办方..." oninput="af()">
  <span class="result-count" id="rc"></span>
</div>

<div class="table-wrap"><div style="overflow-x:auto">
<table><thead><tr>
  <th style="width:90px">状态</th>
  <th class="sortable" style="width:170px" onclick="ts(this)" data-sort="time">讲座时间</th>
  <th style="min-width:340px">讲座标题</th>
  <th style="width:130px">地点</th>
  <th style="width:130px">报告人</th>
  <th style="width:140px">主办方</th>
  <th style="width:90px">详情</th>
</tr></thead>
<tbody id="tb"><tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray)">暂无数据</td></tr></tbody>
</table>
</div></div>

<div class="log-section">
  <div class="log-header"><h3 onclick="document.getElementById('lb').classList.toggle('collapsed')">▶ 爬取日志</h3>
    <button class="log-clear" onclick="document.getElementById('lb').textContent='就绪'">清空</button>
  </div>
  <div class="log-box collapsed" id="lb">就绪</div>
</div>

<div class="footer">
  <span class="dot-g">● 未开始</span>
  <span class="dot-r">● 已过时</span>
  <span class="dot-a">● 未知</span>
  <span style="margin:0 12px;color:var(--border)">|</span>
  <span>点击详情链接可直接打开原讲座页</span>
</div>

<script>
var AL=[], ST={total:0,not_started:0,expired:0,unknown:0};
var CF='未开始', SF='time', SA=true, LG=[];

var TIDX=0;
var THEMES=[
  {id:'theme-ink', name:'墨砚'},
  {id:'theme-ocean', name:'深海'},
  {id:'theme-crimson', name:'赤霞'},
  {id:'theme-bamboo', name:'竹韵'},
  {id:'theme-dusk', name:'暮紫'},
  {id:'theme-frost', name:'霜白'}
];

function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ea(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function g(id){return document.getElementById(id);}

function relTime(ft){
  if(!ft||ft==='无') return '';
  var m=ft.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
  if(!m) return '';
  var d=new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5]);
  var now=new Date();
  var diff=d-now;
  var abs=Math.abs(diff);
  var mins=Math.round(abs/60000);
  if(mins<1) return diff>0?'即将开始':'已开始';
  if(mins<60) return (diff>0?'':'已过')+mins+'分钟'+(diff>0?'后':'前');
  var hrs=Math.round(mins/60);
  if(hrs<24) return (diff>0?'':'已过')+hrs+'小时'+(diff>0?'后':'前');
  var days=Math.round(hrs/24);
  if(days===1) return diff>0?'明天':'昨天';
  if(days<30) return (diff>0?days+'天后':days+'天前');
  return (diff>0?'':'已过')+Math.round(days/30)+'个月'+(diff>0?'后':'前');
}

function us(){
  g('s0').textContent=ST.total;
  g('s1').textContent=ST.not_started;
  g('s2').textContent=ST.expired;
  g('s3').textContent=ST.unknown;
}

function sf(f,btn){
  CF=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  af();
}

function af(){
  var q=(document.querySelector('.search-input').value||'').toLowerCase().trim();
  var F=AL.slice();
  if(CF!=='all') F=F.filter(function(l){return l.status===CF;});
  if(q) F=F.filter(function(l){
    return (l.title||'').toLowerCase().indexOf(q)>-1
        || (l.reporter||'').toLowerCase().indexOf(q)>-1
        || (l.organizer||'').toLowerCase().indexOf(q)>-1;
  });
  F.sort(function(a,b){
    if(a.status!==b.status){
      if(a.status==='未开始') return -1;
      if(b.status==='未开始') return 1;
      if(a.status==='已过时') return -1;
      if(b.status==='已过时') return 1;
      return 0;
    }
    var va=a.formatted_time||'', vb=b.formatted_time||'';
    if(a.status==='已过时')
      return SA ? vb.localeCompare(va) : va.localeCompare(vb);
    return SA ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  g('rc').textContent='共 '+F.length+' 条记录';
  rt(F);
}

function showArrow(){
  var h=document.querySelector('th.sortable');
  if(h) {
    var txt=h.textContent.replace(/[▲▼]/g,'').trim();
    h.innerHTML=es(txt)+' <span class="sort-arrow">'+(SA?'▲':'▼')+'</span>';
  }
}

function ts(th){
  var f=th.dataset.sort;
  if(SF===f){SA=!SA;}else{SF=f;SA=true;}
  showArrow();
  af();
}

function rt(L){
  var tb=g('tb');
  if(!L.length){
    tb.innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray)">没有找到匹配的讲座记录</td></tr>';
    return;
  }
  var h='';
  for(var i=0;i<L.length;i++){
    var l=L[i], td=l.formatted_time||'无';
    if(td.length>=16) td=td.slice(0,16);
    var relative=relTime(l.formatted_time);
    var timeHtml=es(td)+(relative?'<span class="time-rel">'+es(relative)+'</span>':'');
    var statusHtml='<span class="status-dot"></span>'+es(l.status||'未知');
    h+='<tr class="s-'+ea(l.status||'未知')+'">'
      +'<td style="text-align:center;font-weight:600">'+statusHtml+'</td>'
      +'<td style="text-align:center;white-space:nowrap">'+timeHtml+'</td>'
      +'<td style="text-align:left;font-weight:600">'+es(l.title)+'</td>'
      +'<td style="text-align:center;white-space:nowrap">'+es(l.location)+'</td>'
      +'<td style="text-align:center">'+es(l.reporter)+'</td>'
      +'<td style="text-align:center">'+es(l.organizer)+'</td>'
      +'<td style="text-align:center">'+(l.url?'<a class="cell-link" href="'+ea(l.url)+'" target="_blank">打开详情</a>':'—')+'</td>'
      +'</tr>';
  }
  tb.innerHTML=h;
}

function rl(){
  var b=g('lb');
  if(!LG.length){b.textContent='就绪';return;}
  var h='';
  for(var i=0;i<LG.length;i++){
    var c=LG[i].indexOf('[ERROR]')>-1?'color:var(--danger)':LG[i].indexOf('[WARN]')>-1?'color:#FF7D00':'';
    h+='<span style="'+c+'">'+es(LG[i])+'</span><br>';
  }
  b.innerHTML=h;
}

function ap(data){
  if(!data||!data.lectures){ AL=[]; ST={total:0,not_started:0,expired:0,unknown:0}; }
  else {
    AL=data.lectures;
    ST=data.stats||{total:0,not_started:0,expired:0,unknown:0};
    if(data.logs) LG=data.logs;
    if(data.crawl_time) g('ct').textContent='更新于: '+data.crawl_time;
  }
  us(); af(); rl(); showArrow();
  saveTheme();
}

function saveTheme(){
  try { sessionStorage.setItem('nau_theme_idx', TIDX); } catch(e){}
}

function applyTheme(idx){
  TIDX=idx;
  var t=THEMES[idx];
  document.body.className='';
  document.body.classList.add(t.id);
  g('themeLabel').textContent=t.name;
  saveTheme();
  af();
}

function cth(){
  applyTheme((TIDX+1)%THEMES.length);
}

function loadTheme(){
  try {
    var ti=parseInt(sessionStorage.getItem('nau_theme_idx'));
    if(!isNaN(ti) && ti>=0 && ti<THEMES.length) applyTheme(ti);
  } catch(e){}
}

var LECTURE_INIT_DATA = __LECTURE_DATA__;

document.addEventListener('DOMContentLoaded',function(){
  loadTheme();
  ap(LECTURE_INIT_DATA);
});
</script>
</body>
</html>
