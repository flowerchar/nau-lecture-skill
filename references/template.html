<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南京审计大学学术讲座查询系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ========== DEFAULT THEME (corporate blue) ========== */
:root {
  --primary: #165DFF; --success: #00B42A; --danger: #F53F3F;
  --gray: #86909C; --bg: #F7F8FA; --card: #FFFFFF;
  --text: #1D2129; --border: #E5E6EB; --hover: #F0F7FF;
  --bg-green: #E6F7EF; --bg-red: #FFF2F0; --bg-gray: #F7F8FA;
  --ff-display: 'Microsoft YaHei','微软雅黑',sans-serif;
  --ff-mono: Consolas,monospace;
  --header-bg: var(--card);
  --grain: none;
  --radius: 10px;
  --stat-card-bg: var(--card);
  --filter-bar-bg: transparent;
  --filter-bar-border: none;
}
/* ========== DARK THEME (scholarly archive) ========== */
body.dark {
  --primary: #c9a072; --success: #7a9e7e; --danger: #c73e3a;
  --gray: #5c6370; --bg: #0a0a0f; --card: #14141c;
  --text: #f4efe6; --border: rgba(244,239,230,0.08); --hover: #1c1c26;
  --bg-green: transparent; --bg-red: transparent; --bg-gray: transparent;
  --ff-display: 'Cormorant Garamond',serif;
  --ff-mono: 'JetBrains Mono',monospace;
  --header-bg: transparent;
  --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  --radius: 0px;
  --stat-card-bg: var(--card);
  --filter-bar-bg: transparent;
  --filter-bar-border: 1px solid var(--border);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--ff-display);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  transition: background 0.4s ease, color 0.4s ease;
}
body.dark { letter-spacing: 0.01em; }

/* Grain overlay (dark only) */
body.dark::after {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  opacity: 0.035; background-image: var(--grain);
}

/* Header */
.header {
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  padding: 24px 40px;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 16px;
}
.header h1 { font-size: 28px; font-weight: 700; color: var(--primary); }
.header p { font-size: 13px; color: var(--gray); margin-top: 4px; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.theme-btn {
  font-family: var(--ff-mono);
  font-size: 11px; letter-spacing: 0.06em;
  background: transparent; color: var(--gray);
  border: 1px solid var(--border); padding: 8px 18px;
  cursor: pointer; transition: all 0.25s ease;
}
.theme-btn:hover { border-color: var(--primary); color: var(--primary); }
body.dark .header { padding: 48px 56px 32px; }
body.dark .header h1 { font-size: clamp(32px,5vw,48px); line-height: 1.05; letter-spacing: -0.01em; }
body.dark .header p { font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
body.dark .theme-btn { border-radius: 0; padding: 10px 22px; }

/* Stats */
.stats-row { display: flex; gap: 16px; padding: 20px 40px; flex-wrap: wrap; }
.stat-card {
  flex: 1; min-width: 150px; background: var(--stat-card-bg);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 24px; text-align: center;
  transition: all 0.2s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-card .icon { font-size: 28px; margin-bottom: 8px; }
.stat-card .value { font-size: 30px; font-weight: 700; margin-bottom: 4px; }
.stat-card .label { font-size: 13px; color: var(--gray); }
.st0 { border-left: 4px solid var(--primary); } .st0 .value { color: var(--primary); }
.st1 { border-left: 4px solid var(--success); } .st1 .value { color: var(--success); }
.st2 { border-left: 4px solid var(--danger); }  .st2 .value { color: var(--danger); }
.st3 { border-left: 4px solid var(--gray); }    .st3 .value { color: var(--gray); }
body.dark .stats-row { gap: 1px; margin: 0 56px 32px; padding: 0; background: var(--border); }
body.dark .stat-card { border-radius: 0; border: none; text-align: left; padding: 28px 32px; min-width: 140px; }
body.dark .stat-card .value { font-size: 48px; }
body.dark .stat-card .label { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
body.dark .stat-card .icon { display: none; }
body.dark .st0, body.dark .st1, body.dark .st2, body.dark .st3 { border-left: none; }

/* Filters */
.filter-bar {
  display: flex; gap: 12px; padding: 0 40px 16px;
  align-items: center; flex-wrap: wrap;
  background: var(--filter-bar-bg);
  border: var(--filter-bar-border);
}
.filter-btn {
  padding: 6px 16px; font-size: 13px;
  border: 1px solid var(--border); border-radius: 20px;
  background: var(--card); cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--primary); color: var(--primary); }
.filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.search-input {
  flex: 1; min-width: 220px; max-width: 340px; margin-left: auto;
  padding: 8px 14px; font-size: 14px; border: 1px solid var(--border);
  border-radius: 8px; outline: none; background: var(--card); color: var(--text);
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--primary); }
.result-count { font-size: 13px; color: var(--gray); margin-left: 8px; }
body.dark .filter-bar { gap: 0; margin: 0 56px 20px; padding: 0; }
body.dark .filter-btn {
  border-radius: 0; border: none; border-right: 1px solid var(--border);
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 14px 22px;
}
body.dark .filter-btn.active { color: var(--bg); }
body.dark .search-input {
  border-radius: 0; border: none; font-family: var(--ff-mono);
  font-size: 11px; padding: 14px 20px;
}
body.dark .result-count {
  font-family: var(--ff-mono); font-size: 10px;
  border-left: 1px solid var(--border); padding: 14px 20px; margin: 0;
}

/* Table */
.table-wrap {
  margin: 0 40px 24px; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th {
  background: var(--primary); color: #fff; font-weight: 700;
  font-size: 14px; padding: 14px 14px; text-align: center; white-space: nowrap;
}
th.sortable { cursor: pointer; } th.sortable:hover { opacity: 0.85; }
tbody td {
  padding: 11px 14px; border-bottom: 1px solid var(--border);
  vertical-align: middle; transition: background 0.15s, opacity 0.3s;
}
tbody tr:hover { background: var(--hover); }
.s-未开始 { background: var(--bg-green); color: var(--success); }
.s-已过时 { background: var(--bg-red);    color: var(--danger); }
.s-未知   { background: var(--bg-gray);   color: var(--gray); }
.s-未开始:hover, .s-已过时:hover, .s-未知:hover { filter: brightness(0.97); }
a.cell-link { color: var(--primary); text-decoration: none; font-size: 13px; }
a.cell-link:hover { text-decoration: underline; }

body.dark .table-wrap {
  margin: 0 56px 28px; border-radius: 0;
  background: transparent; box-shadow: none;
}
body.dark table { font-size: 15px; }
body.dark thead th {
  background: var(--card); color: var(--gray);
  font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.12em;
  text-transform: uppercase; font-weight: 600; padding: 16px 14px;
  text-align: left; border-bottom: 1px solid var(--border);
}
body.dark tbody td { padding: 18px 14px; }
body.dark .s-未开始, body.dark .s-已过时, body.dark .s-未知 { background: transparent; }
body.dark .s-未开始:hover, body.dark .s-已过时:hover, body.dark .s-未知:hover { background: var(--hover); filter: none; }
body.dark a.cell-link { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px dotted var(--primary); }

/* Log */
.log-section { margin: 0 40px 24px; }
.log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.log-header h3 { font-size: 15px; font-weight: 700; cursor: pointer; user-select: none; }
.log-header h3:hover { color: var(--primary); }
.log-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 18px;
  font-family: var(--ff-mono); font-size: 12px;
  max-height: 180px; overflow-y: auto; color: var(--text);
  transition: all 0.3s ease;
}
.log-box.collapsed { display: none; }
.log-clear {
  font-size: 12px; color: var(--gray); background: var(--card);
  border: 1px solid var(--border); border-radius: 6px; padding: 4px 14px; cursor: pointer;
}
body.dark .log-section { margin: 0 56px 28px; }
body.dark .log-header h3 { font-family: var(--ff-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray); }
body.dark .log-box { border-radius: 0; font-size: 10px; padding: 16px 20px; }

/* Relative time hint */
.time-rel { font-size: 11px; color: var(--gray); display: block; margin-top: 2px; }
body.dark .time-rel { font-size: 9px; }

/* Sort arrow */
.sort-arrow { font-size: 10px; margin-left: 2px; }

/* Footer */
.footer {
  margin: 0 40px 30px; padding: 14px 20px; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius);
  text-align: center; font-size: 13px; color: var(--gray);
}
.dot-g { color: var(--success); font-weight: 700; }
.dot-r { color: var(--danger); font-weight: 700; }
.dot-a { color: var(--gray); font-weight: 700; }
body.dark .footer {
  margin: 0 56px 40px; border-radius: 0; background: transparent;
  border: none; border-top: 1px solid var(--border);
  font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.08em;
  padding: 24px 0 0;
}

@media (max-width: 768px) {
  .header, .stats-row, .filter-bar, .table-wrap, .log-section, .footer { margin-left: 20px; margin-right: 20px; }
  .header, .stats-row { padding-left: 20px; padding-right: 20px; }
  .filter-bar { padding-left: 20px; padding-right: 20px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>南京审计大学学术讲座查询系统</h1>
    <p>全状态展示 · 智能排序 · 关键词搜索 | 数据源: nau.edu.cn</p>
  </div>
  <div class="header-actions">
    <span style="font-size:12px;color:var(--gray)" id="ct"></span>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">⇄ 深色档案</button>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card st0"><div class="icon">📅</div><div class="value" id="s0">—</div><div class="label">总讲座数</div></div>
  <div class="stat-card st1"><div class="icon">⏰</div><div class="value" id="s1">—</div><div class="label">未开始</div></div>
  <div class="stat-card st2"><div class="icon">📜</div><div class="value" id="s2">—</div><div class="label">已过时</div></div>
  <div class="stat-card st3"><div class="icon">❓</div><div class="value" id="s3">—</div><div class="label">状态未知</div></div>
</div>

<div class="filter-bar">
  <label style="font-weight:600;font-size:13px;color:var(--gray)">筛选：</label>
  <button class="filter-btn" onclick="sf('all',this)">全部</button>
  <button class="filter-btn active" onclick="sf('未开始',this)">未开始</button>
  <button class="filter-btn" onclick="sf('已过时',this)">已过时</button>
  <button class="filter-btn" onclick="sf('未知',this)">未知</button>
  <input class="search-input" placeholder="搜索标题 / 报告人 / 主办方..." oninput="af()">
  <span class="result-count" id="rc"></span>
</div>

<div class="table-wrap"><div style="overflow-x:auto">
<table><thead><tr>
  <th style="width:90px">状态</th>
  <th class="sortable" style="width:180px" onclick="ts(this)" data-sort="time">讲座时间</th>
  <th style="min-width:340px">讲座标题</th>
  <th style="width:120px">地点</th>
  <th style="width:140px">报告人</th>
  <th style="width:150px">主办方</th>
  <th style="width:100px">详情链接</th>
</tr></thead>
<tbody id="tb"><tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray)">暂无数据</td></tr></tbody>
</table>
</div></div>

<div class="log-section">
  <div class="log-header"><h3 onclick="document.getElementById('lb').classList.toggle('collapsed')">▶ 爬取日志</h3>
    <button class="log-clear" onclick="document.getElementById('lb').textContent='就绪'">清空</button>
  </div>
  <div class="log-box collapsed" id="lb">就绪</div>
</div>

<div class="footer">
  <span class="dot-g">● 未开始</span>
  <span class="dot-r">● 已过时</span>
  <span class="dot-a">● 未知</span>
  <span style="margin-left:16px">|</span>
  <span>点击详情链接可直接打开原讲座页</span>
</div>

<script>
var AL=[], ST={total:0,not_started:0,expired:0,unknown:0};
var CF='未开始', SF='time', SA=true, LG=[];

function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ea(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function g(id){return document.getElementById(id);}

function relTime(ft){
  if(!ft||ft==='无') return '';
  var m=ft.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
  if(!m) return '';
  var d=new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5]);
  var now=new Date();
  var diff=d-now;
  var abs=Math.abs(diff);
  var mins=Math.round(abs/60000);
  if(mins<1) return diff>0?'即将开始':'已开始';
  if(mins<60) return (diff>0?'':'已过')+mins+'分钟'+(diff>0?'后':'前');
  var hrs=Math.round(mins/60);
  if(hrs<24) return (diff>0?'':'已过')+hrs+'小时'+(diff>0?'后':'前');
  var days=Math.round(hrs/24);
  if(days===1) return diff>0?'明天':'昨天';
  if(days<30) return (diff>0?days+'天后':days+'天前');
  return (diff>0?'':'已过')+Math.round(days/30)+'个月'+(diff>0?'后':'前');
}

function us(){
  g('s0').textContent=ST.total;
  g('s1').textContent=ST.not_started;
  g('s2').textContent=ST.expired;
  g('s3').textContent=ST.unknown;
}

function sf(f,btn){
  CF=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  af();
}

function af(){
  var q=(document.querySelector('.search-input').value||'').toLowerCase().trim();
  var F=AL.slice();
  if(CF!=='all') F=F.filter(function(l){return l.status===CF;});
  if(q) F=F.filter(function(l){
    return (l.title||'').toLowerCase().indexOf(q)>-1
        || (l.reporter||'').toLowerCase().indexOf(q)>-1
        || (l.organizer||'').toLowerCase().indexOf(q)>-1;
  });
  F.sort(function(a,b){
    if(a.status!==b.status){
      if(a.status==='未开始') return -1;
      if(b.status==='未开始') return 1;
      if(a.status==='已过时') return -1;
      if(b.status==='已过时') return 1;
      return 0;
    }
    var va=a.formatted_time||'', vb=b.formatted_time||'';
    if(a.status==='已过时')
      return SA ? vb.localeCompare(va) : va.localeCompare(vb);
    return SA ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  g('rc').textContent='共 '+F.length+' 条记录';
  rt(F);
}

function showArrow(){
  var h=document.querySelector('th.sortable');
  if(h) {
    var txt=h.textContent.replace(/[▲▼]/g,'').trim();
    h.innerHTML=es(txt)+' <span class="sort-arrow">'+(SA?'▲':'▼')+'</span>';
  }
}

function ts(th){
  var f=th.dataset.sort;
  if(SF===f){SA=!SA;}else{SF=f;SA=true;}
  showArrow();
  af();
}

function rt(L){
  var tb=g('tb'), isDark=document.body.classList.contains('dark');
  if(!L.length){
    tb.innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray)">没有找到匹配的讲座记录</td></tr>';
    return;
  }
  var h='';
  for(var i=0;i<L.length;i++){
    var l=L[i], td=l.formatted_time||'无';
    if(td.length>=16) td=td.slice(0,16);
    var relative=relTime(l.formatted_time);
    var timeHtml=es(td)+(relative?'<span class="time-rel">'+es(relative)+'</span>':'');
    var statusHtml=isDark
      ? '<span class="status-stamp" style="display:inline-flex;align-items:center;gap:8px;font-family:var(--ff-mono);font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase">'+es(l.status||'未知')+'</span>'
      : '<span style="font-weight:700">'+es(l.status||'未知')+'</span>';
    h+='<tr class="s-'+ea(l.status||'未知')+'">'
      +'<td style="text-align:center">'+statusHtml+'</td>'
      +'<td style="text-align:center;white-space:nowrap">'+timeHtml+'</td>'
      +'<td style="text-align:left;font-weight:600">'+es(l.title)+'</td>'
      +'<td style="text-align:center;white-space:nowrap">'+es(l.location)+'</td>'
      +'<td style="text-align:center">'+es(l.reporter)+'</td>'
      +'<td style="text-align:center">'+es(l.organizer)+'</td>'
      +'<td style="text-align:center">'+(l.url?'<a class="cell-link" href="'+ea(l.url)+'" target="_blank">打开详情</a>':'—')+'</td>'
      +'</tr>';
  }
  tb.innerHTML=h;
}

function rl(){
  var b=g('lb');
  if(!LG.length){b.textContent='就绪';return;}
  var h='';
  for(var i=0;i<LG.length;i++){
    var c=LG[i].indexOf('[ERROR]')>-1?'color:var(--danger)':LG[i].indexOf('[WARN]')>-1?'color:#FF7D00':'';
    h+='<span style="'+c+'">'+es(LG[i])+'</span><br>';
  }
  b.innerHTML=h;
}

function ap(data){
  if(!data||!data.lectures){ AL=[]; ST={total:0,not_started:0,expired:0,unknown:0}; }
  else {
    AL=data.lectures;
    ST=data.stats||{total:0,not_started:0,expired:0,unknown:0};
    if(data.logs) LG=data.logs;
    if(data.crawl_time) g('ct').textContent='更新于: '+data.crawl_time;
  }
  us(); af(); rl(); showArrow();
  saveToStorage();
}

function saveToStorage(){
  try { sessionStorage.setItem('nau_theme', document.body.classList.contains('dark')?'dark':'light'); } catch(e){}
}

function toggleTheme(){
  var body=document.body;
  var btn=g('themeBtn');
  if(body.classList.contains('dark')){
    body.classList.remove('dark');
    btn.textContent='⇄ 深色档案';
    document.title='南京审计大学学术讲座查询系统';
  } else {
    body.classList.add('dark');
    btn.textContent='⇄ 默认视图';
    document.title='学术讲座 · 档案视图';
  }
  saveToStorage();
  af();
}

function loadTheme(){
  try {
    var t=sessionStorage.getItem('nau_theme');
    if(t==='dark'){
      document.body.classList.add('dark');
      g('themeBtn').textContent='⇄ 默认视图';
      document.title='学术讲座 · 档案视图';
    }
  } catch(e){}
}

var LECTURE_INIT_DATA = __LECTURE_DATA__;

document.addEventListener('DOMContentLoaded',function(){
  loadTheme();
  ap(LECTURE_INIT_DATA);
});
</script>
</body>
</html>
