<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学术讲座 · 档案视图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0a0a0f;
  --paper: #f4efe6;
  --parchment: #e8e0d3;
  --vermillion: #c73e3a;
  --patina: #7a9e7e;
  --gold: #c9a072;
  --slate: #5c6370;
  --divider: rgba(244,239,230,0.08);
  --surface: #14141c;
  --surface-hover: #1c1c26;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
  background: var(--ink);
  color: var(--paper);
  min-height: 100vh;
  line-height: 1.7;
  letter-spacing: 0.01em;
}

/* Grain texture overlay */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Loading overlay */
.loading-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--ink);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.6s ease;
}
.loading-overlay.hidden { opacity:0; pointer-events:none; }
.loading-orb {
  width: 48px; height: 48px;
  border: 2px solid var(--divider);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: orbit 1.2s cubic-bezier(0.6,0.2,0.4,0.8) infinite;
  margin-bottom: 28px;
}
@keyframes orbit { to { transform: rotate(360deg); } }
.loading-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 600; color: var(--paper);
  letter-spacing: 0.08em; margin-bottom: 8px;
}
.loading-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--slate);
  letter-spacing: 0.05em; margin-bottom: 18px;
}
.loading-log {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--slate);
  max-height: 100px; overflow-y: auto; text-align: center;
  line-height: 1.8; opacity: 0.7;
}

/* Header — asymmetric, oversized */
.header {
  padding: 48px 56px 32px;
  display: grid; grid-template-columns: 1fr auto;
  align-items: end; gap: 24px;
}
.header-left h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -0.01em;
  color: var(--paper);
}
.header-left h1 span { color: var(--vermillion); font-style: italic; }
.header-left p {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--slate);
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-top: 10px;
}
.header-right {
  display: flex; align-items: center; gap: 16px;
}
.theme-switch {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.06em;
  background: transparent; color: var(--slate);
  border: 1px solid var(--divider); padding: 10px 20px;
  cursor: pointer; transition: all 0.3s ease;
  text-transform: uppercase;
}
.theme-switch:hover { border-color: var(--gold); color: var(--gold); }
.crawl-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--slate);
  opacity: 0.6;
}

/* Stats — horizontal scroll */
.stats-band {
  display: flex; gap: 1px;
  margin: 0 56px 32px;
  background: var(--divider);
  overflow: hidden;
}
.stat-card {
  flex: 1; min-width: 140px;
  background: var(--surface);
  padding: 28px 32px;
  position: relative;
  overflow: hidden;
  cursor: default;
  transition: background 0.3s ease;
}
.stat-card:hover { background: var(--surface-hover); }
.stat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  transition: height 0.3s ease;
}
.stat-card:nth-child(1)::before { background: var(--paper); }
.stat-card:nth-child(2)::before { background: var(--patina); }
.stat-card:nth-child(3)::before { background: var(--vermillion); }
.stat-card:nth-child(4)::before { background: var(--slate); }
.stat-card:hover::before { height: 4px; }
.stat-card .sc-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px; font-weight: 700; line-height: 1;
  margin-bottom: 6px;
}
.stat-card:nth-child(1) .sc-value { color: var(--paper); }
.stat-card:nth-child(2) .sc-value { color: var(--patina); }
.stat-card:nth-child(3) .sc-value { color: var(--vermillion); }
.stat-card:nth-child(4) .sc-value { color: var(--slate); }
.stat-card .sc-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--slate);
}

/* Filter bar — monospace toolbar */
.filter-bar {
  display: flex; gap: 0; align-items: center; flex-wrap: wrap;
  margin: 0 56px 20px;
  border: 1px solid var(--divider);
}
.filter-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--slate);
  padding: 14px 20px;
  border-right: 1px solid var(--divider);
}
.filter-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 14px 22px;
  border: none; border-right: 1px solid var(--divider);
  background: transparent; color: var(--slate);
  cursor: pointer; transition: all 0.2s ease;
}
.filter-btn:hover { color: var(--paper); background: var(--surface); }
.filter-btn.active { color: var(--ink); background: var(--paper); font-weight: 600; }
.filter-btn:last-of-type { border-right: none; }
.search-input {
  flex: 1; min-width: 200px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--paper);
  background: transparent; border: none;
  padding: 14px 20px; outline: none;
  letter-spacing: 0.03em;
}
.search-input::placeholder { color: var(--slate); }
.result-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--slate);
  padding: 14px 20px;
  border-left: 1px solid var(--divider);
}

/* Table — austere, border-driven */
.table-wrap {
  margin: 0 56px 28px;
  border: 1px solid var(--divider);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--slate);
  padding: 16px 14px; text-align: left;
  border-bottom: 1px solid var(--divider);
  background: var(--surface);
}
th.sortable { cursor: pointer; transition: color 0.2s; }
th.sortable:hover { color: var(--gold); }
tbody td {
  padding: 18px 14px;
  border-bottom: 1px solid var(--divider);
  vertical-align: middle;
  font-size: 15px;
  transition: background 0.2s ease;
  opacity: 0;
  animation: rowIn 0.5s ease forwards;
}
@keyframes rowIn { to { opacity: 1; } }
tbody tr { transition: background 0.2s ease; }
tbody tr:hover { background: var(--surface-hover); }
tbody tr:last-child td { border-bottom: none; }

/* Status stamps — geometric, not backgrounds */
.status-stamp {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; white-space: nowrap;
}
.status-stamp::before {
  content: '';
  width: 8px; height: 8px;
  flex-shrink: 0;
}
.ss-未开始 { color: var(--patina); } .ss-未开始::before { background: var(--patina); }
.ss-已过时 { color: var(--vermillion); } .ss-已过时::before { background: var(--vermillion); }
.ss-未知   { color: var(--slate); } .ss-未知::before { background: var(--slate); }

.cell-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--paper);
  white-space: nowrap;
}
.cell-title {
  font-weight: 600; color: var(--paper);
  letter-spacing: 0.01em;
}
.cell-reporter, .cell-organizer {
  font-size: 14px; color: var(--parchment);
}
.cell-link a {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--gold);
  text-decoration: none; border-bottom: 1px dotted var(--gold);
  padding-bottom: 2px; transition: all 0.2s;
}
.cell-link a:hover { color: var(--paper); border-color: var(--paper); }
.cell-loading {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--slate);
  font-style: italic;
}

/* Log — monospace appendix */
.log-section { margin: 0 56px 28px; }
.log-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.log-header h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--slate);
}
.log-clear {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.08em;
  background: transparent; color: var(--slate);
  border: 1px solid var(--divider); padding: 4px 14px;
  cursor: pointer; transition: all 0.2s; text-transform: uppercase;
}
.log-clear:hover { border-color: var(--vermillion); color: var(--vermillion); }
.log-box {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--slate);
  line-height: 1.9; max-height: 140px; overflow-y: auto;
  padding: 16px 20px; border: 1px solid var(--divider);
  background: var(--surface);
}

/* Footer */
.footer {
  margin: 0 56px 40px; padding: 24px 0;
  border-top: 1px solid var(--divider);
  display: flex; justify-content: center; gap: 16px;
  flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.08em;
  color: var(--slate);
}
.footer .dot-patina { color: var(--patina); }
.footer .dot-vermillion { color: var(--vermillion); }
.footer .dot-slate { color: var(--slate); }

@media (max-width: 768px) {
  .header { padding: 28px 20px 20px; grid-template-columns: 1fr; }
  .stats-band { margin: 0 20px 20px; flex-wrap: wrap; }
  .stat-card { min-width: 50%; }
  .filter-bar { margin: 0 20px 16px; flex-wrap: wrap; }
  .filter-label { width: 100%; border-right: none; border-bottom: 1px solid var(--divider); }
  .search-input { min-width: 100%; border-left: none; border-top: 1px solid var(--divider); }
  .result-count { border-top: 1px solid var(--divider); width: 100%; }
  .table-wrap { margin: 0 20px 20px; }
  .log-section { margin: 0 20px 20px; }
  .footer { margin: 0 20px 30px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="lo">
  <div class="loading-orb"></div>
  <div class="loading-title" id="lt">检索档案中…</div>
  <div class="loading-sub" id="ls">NAU · 学术讲座档案馆</div>
  <div class="loading-log" id="ll">初始化连接…</div>
</div>

<div class="header">
  <div class="header-left">
    <h1>学术讲座<span>档案</span></h1>
    <p>南京审计大学 · Academic Lecture Archive</p>
  </div>
  <div class="header-right">
    <span class="crawl-time" id="ct"></span>
    <button class="theme-switch" onclick="switchTheme()">切换视图 ⇄</button>
  </div>
</div>

<div class="stats-band">
  <div class="stat-card"><div class="sc-value" id="s0">—</div><div class="sc-label">馆藏总计</div></div>
  <div class="stat-card"><div class="sc-value" id="s1">—</div><div class="sc-label">即将开始</div></div>
  <div class="stat-card"><div class="sc-value" id="s2">—</div><div class="sc-label">已归档</div></div>
  <div class="stat-card"><div class="sc-value" id="s3">—</div><div class="sc-label">待考证</div></div>
</div>

<div class="filter-bar">
  <span class="filter-label">筛选</span>
  <button class="filter-btn active" onclick="sf('all',this)">全部</button>
  <button class="filter-btn" onclick="sf('未开始',this)">未开始</button>
  <button class="filter-btn" onclick="sf('已过时',this)">已过时</button>
  <button class="filter-btn" onclick="sf('未知',this)">未知</button>
  <input class="search-input" placeholder="检索标题、报告人、主办方…" oninput="af()">
  <span class="result-count" id="rc"></span>
</div>

<div class="table-wrap"><div style="overflow-x:auto">
<table><thead><tr>
  <th style="width:100px">状态</th>
  <th class="sortable" style="width:180px" onclick="ts(this)" data-sort="time">时间 &#x2195;</th>
  <th style="min-width:340px">标题</th>
  <th style="width:140px">报告人</th>
  <th style="width:150px">主办方</th>
  <th style="width:110px">档案链接</th>
</tr></thead>
<tbody id="tb"><tr><td colspan="6" style="text-align:center;padding:48px;color:var(--slate);font-family:'JetBrains Mono',monospace;font-size:12px">档案检索中…</td></tr></tbody>
</table>
</div></div>

<div class="log-section">
  <div class="log-header">
    <h3>系统日志</h3>
    <button class="log-clear" onclick="document.getElementById('lb').textContent='—'">清空</button>
  </div>
  <div class="log-box" id="lb">—</div>
</div>

<div class="footer">
  <span class="dot-patina">◆ 即将开始</span>
  <span class="dot-vermillion">◆ 已归档</span>
  <span class="dot-slate">◆ 待考证</span>
</div>

<script>
// ======================== Shared State ========================
var AL=[], ST={total:0,not_started:0,expired:0,unknown:0};
var CF='all', SF='time', SA=true, LG=[], TM=null, PH='init';

function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ea(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function g(id){return document.getElementById(id);}

function sl(msg){
  g('lo').classList.remove('hidden');
  if(msg) g('lt').textContent=msg;
}
function hl(){ g('lo').classList.add('hidden'); }

function us(){
  g('s0').textContent=ST.total;
  g('s1').textContent=ST.not_started;
  g('s2').textContent=ST.expired;
  g('s3').textContent=ST.unknown;
}

function sf(f,btn){
  CF=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  af();
}

function af(){
  var q=(document.querySelector('.search-input').value||'').toLowerCase().trim();
  var F=AL.slice();
  if(CF!=='all') F=F.filter(function(l){return l.status===CF;});
  if(q) F=F.filter(function(l){
    return (l.title||'').toLowerCase().indexOf(q)>-1
        || (l.reporter||'').toLowerCase().indexOf(q)>-1
        || (l.organizer||'').toLowerCase().indexOf(q)>-1;
  });
  F.sort(function(a,b){
    var va=a.formatted_time||'', vb=b.formatted_time||'';
    if(a.status==='已过时'&&b.status==='已过时')
      return SA ? vb.localeCompare(va) : va.localeCompare(vb);
    return SA ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  g('rc').textContent=F.length+' 条';
  rt(F);
}

function ts(th){
  var f=th.dataset.sort;
  if(SF===f){SA=!SA;}else{SF=f;SA=true;}
  af();
}

function rt(L){
  var tb=g('tb');
  if(!L.length){
    tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:48px;color:var(--slate);font-family:\'JetBrains Mono\',monospace;font-size:12px">无匹配档案</td></tr>';
    return;
  }
  var h='';
  for(var i=0;i<L.length;i++){
    var l=L[i], td=l.formatted_time||'—';
    if(td.length>=16) td=td.slice(0,16);
    var rp=l.reporter==='加载中...'?'<span class="cell-loading">···</span>':es(l.reporter);
    var og=l.organizer==='加载中...'?'<span class="cell-loading">···</span>':es(l.organizer);
    h+='<tr style="animation-delay:'+(i*0.03)+'s">'
      +'<td><span class="status-stamp ss-'+ea(l.status||'未知')+'">'+es(l.status||'未知')+'</span></td>'
      +'<td class="cell-time">'+es(td)+'</td>'
      +'<td class="cell-title">'+es(l.title)+'</td>'
      +'<td class="cell-reporter">'+rp+'</td>'
      +'<td class="cell-organizer">'+og+'</td>'
      +'<td class="cell-link">'+(l.url?'<a href="'+ea(l.url)+'" target="_blank">查阅 →</a>':'—')+'</td>'
      +'</tr>';
  }
  tb.innerHTML=h;
}

function rl(){
  var b=g('lb');
  if(!LG.length){b.textContent='—';return;}
  var h='';
  for(var i=0;i<LG.length;i++){
    var c=LG[i].indexOf('[ERROR]')>-1?'color:var(--vermillion)':LG[i].indexOf('[WARN]')>-1?'color:var(--gold)':'';
    h+='<span style="'+c+'">'+es(LG[i])+'</span><br>';
  }
  b.innerHTML=h;
}

function saveToStorage(){
  try { sessionStorage.setItem('nau_data', JSON.stringify({AL:AL,ST:ST,LG:LG,ct:g('ct').textContent,PH:PH})); } catch(e){}
}

function ap(data){
  if(!data||!data.lectures){ AL=[]; ST={total:0,not_started:0,expired:0,unknown:0}; }
  else {
    AL=data.lectures;
    ST=data.stats||{total:0,not_started:0,expired:0,unknown:0};
    if(data.logs) LG=data.logs;
    if(data.crawl_time) g('ct').textContent='索引: '+data.crawl_time;
  }
  us(); af(); rl();
  saveToStorage();
}

function switchTheme(){
  saveToStorage();
  window.location.href='/template.html';
}

async function fd(){
  g('ll').innerHTML='> 建立档案连接…';
  try {
    var resp=await fetch('/crawl');
    g('ll').innerHTML='> 服务器响应';
    var data=await resp.json();

    if(data.status==='crawling'){
      if(data.logs) g('ll').innerHTML=data.logs.slice(-6).map(es).join('<br>');
      TM=setTimeout(fd,1500); return;
    }
    g('ll').innerHTML='> 检索完成: '+ (data.stats?data.stats.total:0)+' 条档案';

    var isNew=(PH==='init');
    ap(data);
    if(isNew){ hl(); }
    PH=data.phase||'done';

    if(PH==='enriching'){
      g('ls').textContent='补充档案详情… '+ (data.enrich_progress||'');
      TM=setTimeout(fd,2000);
    } else if(PH==='done'){
      g('ls').textContent='档案完整';
    }
  } catch(e){
    g('lt').textContent='连接中断: '+e.message;
    g('ll').textContent='2 秒后重试…';
    TM=setTimeout(fd,2000);
  }
}

document.addEventListener('DOMContentLoaded',function(){
  var cached=null;
  try { cached=sessionStorage.getItem('nau_data'); } catch(e){}
  if(cached){
    try {
      var d=JSON.parse(cached);
      AL=d.AL||[]; ST=d.ST||{total:0,not_started:0,expired:0,unknown:0};
      LG=d.LG||[]; PH=d.PH||'done';
      if(d.ct) g('ct').textContent=d.ct;
      us(); af(); rl();
      hl();
      // If data was from a completed crawl, stop here
      if(PH==='done') return;
    } catch(e){}
  }
  sl('检索档案中…');
  g('ls').textContent='NAU · 学术讲座档案馆';
  g('ll').innerHTML='初始化连接…';
  fd();
});
</script>
</body>
</html>
